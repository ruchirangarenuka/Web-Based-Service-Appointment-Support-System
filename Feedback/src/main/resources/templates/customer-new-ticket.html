<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Support Ticket</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        header { background: #2c3e50; color: #fff; padding: 16px 24px; }
        main { max-width: 700px; margin: 30px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #d0d4da; }
        textarea { min-height: 120px; resize: vertical; }
        button { margin-top: 16px; padding: 10px 18px; background: #3498db; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
        a { color: #3498db; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<header>
    <h1>Create Support Ticket</h1>
</header>
<main>

    <form id="ticketForm" th:action="@{/customer/new}" method="post">
        <label for="name">Your Name</label>
        <input id="name" name="name" type="text" required>

        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text" required>

        <label for="description">Complaint / Description</label>
        <textarea id="description" name="description" required></textarea>

        <button type="submit">Submit Ticket</button>
    </form>

    <!-- Success/Error Message -->
    <div id="responseMessage" class="message"></div>

    <p style="margin-top: 16px;">
        <a th:href="@{/}">&larr; Back to home</a>
    </p>

</main>

<script>
    const form = document.getElementById("ticketForm");
    const messageDiv = document.getElementById("responseMessage");

    form.addEventListener("submit", function(event) {
        event.preventDefault(); // Stop normal form submission

        console.log("Submitting form to /customer/new endpoint...");

        const formData = new FormData(form);

        fetch(form.action, {
            method: "POST",
            body: formData
        })
            .then(response => {
                if (response.ok) {
                    return response.text();
                }
                throw new Error("Network response was not ok");
            })
            .then(data => {
                console.log("API Response:", data);

                messageDiv.className = "message success";
                messageDiv.style.display = "block";
                messageDiv.innerText = "✅ Ticket submitted successfully!";

                form.reset();
            })
            .catch(error => {
                console.error("Error submitting ticket:", error);

                messageDiv.className = "message error";
                messageDiv.style.display = "block";
                messageDiv.innerText = "❌ Failed to submit ticket. Please check API.";
            });
    });
</script>

</body>
</html>
