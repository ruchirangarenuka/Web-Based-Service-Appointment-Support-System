<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        header { background: #2c3e50; color: #fff; padding: 16px 24px; }
        main { max-width: 500px; margin: 30px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input[type="password"] { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #d0d4da; }
        button { margin-top: 16px; padding: 10px 18px; background: #3498db; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        .error { color: #c0392b; margin-top: 12px; }
        a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <h1>Admin Login</h1>
</header>
<main>
    <form th:action="@{/admin/login}" method="post">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Login</button>
    </form>
    <p th:if="${error}" class="error" th:text="${error}"></p>
    <p style="margin-top: 16px;">
        <a th:href="@{/}">&larr; Back to home</a>
    </p>
</main>
</body>
</html>
