<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Support & Feedback</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        header { background: #2c3e50; color: #fff; padding: 16px 24px; }
        main { max-width: 900px; margin: 30px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
        h1, h2 { margin-top: 0; }
        .cards { display: flex; flex-wrap: wrap; gap: 16px; }
        .card { flex: 1 1 260px; padding: 16px; border-radius: 8px; border: 1px solid #e0e4ea; background: #fafbfe; }
        .card h3 { margin-top: 0; }
        a.button { display: inline-block; margin-top: 8px; padding: 8px 14px; border-radius: 4px; background: #3498db; color: #fff; text-decoration: none; }
        a.button.secondary { background: #27ae60; }
    </style>
</head>
<body>
<header>
    <h1>Customer Support &amp; Feedback Management</h1>
</header>
<main>
    <h2>Choose a portal</h2>
    <div class="cards">
        <div class="card">
            <h3>Customer</h3>
            <p>Create support tickets, send complaints, give ratings and feedback, and check ticket status.</p>
            <a class="button" th:href="@{/customer/new}">Create Ticket</a>
            <a class="button secondary" th:href="@{/customer/my-tickets}">My Tickets</a>
        </div>
        <div class="card">
            <h3>Admin</h3>
            <p>View and manage customer tickets, reply to customers, update status, and close issues.</p>
            <a class="button" th:href="@{/admin}">Admin Login</a>
        </div>
    </div>
</main>
</body>
</html>
